<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>agentic-review — shell</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; color: #1a1a1a; }
    h1 { font-size: 1.4rem; }
    .row { margin: 0.75rem 0; }
    input { padding: 0.4rem; width: 22rem; max-width: 100%; }
    button { padding: 0.45rem 0.9rem; cursor: pointer; }
    #status { font-weight: 600; }
    .ok { color: #137333; }
    .err { color: #c5221f; }
    pre { background: #f4f4f4; padding: 0.75rem; overflow: auto; border-radius: 6px; }
    code { background: #f0f0f0; padding: 0 0.25rem; border-radius: 3px; }
  </style>
</head>
<body>
  <h1>agentic-review — connectivity test</h1>
  <p>
    This static shell talks only to your local bridge server. Provide the port via the
    <code>?port=</code> query string (e.g. <code>?port=8900</code>), or a full base URL
    via <code>?api=</code> (e.g. <code>?api=http://localhost:8900</code>).
  </p>

  <div class="row">
    <label>Server base URL:
      <input id="base" type="text" placeholder="http://localhost:8900" />
    </label>
  </div>
  <div class="row">
    <button id="ping">Test GET /ping</button>
    <button id="post">Test POST /comments</button>
  </div>
  <div class="row">Status: <span id="status">idle</span></div>
  <pre id="out">(no response yet)</pre>

  <script src="app.js"></script>
</body>
</html>
